apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-secret-operator-resources
  namespace: argocd
spec:
  project: vault-secret-operator
  source:
    repoURL: https://github.com/gezb/homelab.git
    targetRevision: HEAD
    path: gitops/homelab-cluster/vault-secret-operator-resources
    directory:
      recurse: false
      include: '*.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
  revisionHistoryLimit: 1
